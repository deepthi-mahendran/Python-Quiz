<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Exam – Fundamentals of Programming</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #f0f4f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .app {
      max-width: 960px;
      width: 100%;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
      padding: 28px 32px 36px;
      transition: 0.2s;
    }
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 2px solid #e9edf4;
      padding-bottom: 14px;
      margin-bottom: 18px;
    }
    .title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0b2b4a;
      letter-spacing: -0.3px;
    }
    .title small {
      font-weight: 400;
      font-size: 0.75rem;
      color: #5e6f8d;
      display: block;
      margin-top: 2px;
    }
    .score-badge {
      background: #1a4b7a;
      color: #fff;
      padding: 7px 22px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 10px rgba(26, 75, 122, 0.25);
    }
    .score-badge span {
      background: rgba(255,255,255,0.2);
      padding: 0 12px;
      border-radius: 30px;
      font-size: 1.1rem;
    }
    /* Progress */
    .progress-wrap {
      margin-bottom: 22px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #3d5670;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .progress-track {
      width: 100%;
      height: 8px;
      background: #e2e8f0;
      border-radius: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #3b82f6);
      border-radius: 20px;
      transition: width 0.4s ease;
    }
    /* Section badge */
    .section-badge {
      display: inline-block;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.3px;
      padding: 3px 16px;
      border-radius: 30px;
      margin-bottom: 10px;
      background: #dbeafe;
      color: #1a4b7a;
    }
    .section-badge.part-b {
      background: #fce7f3;
      color: #9d174d;
    }
    /* Question card */
    .question-card {
      animation: fadeSlide 0.3s ease;
    }
    @keyframes fadeSlide {
      0% { opacity: 0.4; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .q-number {
      font-size: 0.85rem;
      color: #5e6f8d;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .q-text {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0b1e30;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .q-text .code-block {
      background: #1e293b;
      color: #e2e8f0;
      padding: 12px 16px;
      border-radius: 12px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      overflow-x: auto;
      margin: 12px 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .q-text .code-block .blank-input {
      background: #2d3748;
      border: 2px solid #4a5568;
      color: #fbbf24;
      padding: 2px 8px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9rem;
      min-width: 60px;
      width: auto;
      display: inline-block;
      text-align: center;
    }
    .q-text .code-block .blank-input:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.3);
    }
    .q-text .code-block .blank-input:disabled {
      opacity: 0.7;
      border-color: #4a5568;
    }
    .q-text .sub-q {
      display: block;
      margin-top: 8px;
      font-weight: 500;
      color: #1f3a57;
      font-size: 0.95rem;
    }
    /* Options (MCQ) */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 12px 0 10px;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f8fafc;
      padding: 11px 18px;
      border-radius: 14px;
      border: 2px solid transparent;
      transition: 0.15s;
      cursor: pointer;
    }
    .option-item:hover {
      background: #eef4ff;
      border-color: #b7c9e6;
    }
    .option-item.selected {
      background: #e0edff;
      border-color: #2563eb;
    }
    .option-item.correct-reveal {
      background: #d1fae5;
      border-color: #059669;
    }
    .option-item.wrong-reveal {
      background: #fee2e2;
      border-color: #dc2626;
    }
    .option-item input[type="radio"] {
      accent-color: #2563eb;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .option-item .opt-label {
      font-weight: 600;
      color: #1a2f44;
      font-size: 0.95rem;
      min-width: 20px;
    }
    .option-item .opt-text {
      color: #1f3a57;
      font-size: 0.95rem;
    }
    /* Feedback */
    .feedback-box {
      margin: 16px 0 12px;
      padding: 16px 20px;
      border-radius: 16px;
      background: #f1f5f9;
      border-left: 5px solid #6b7f9a;
      display: none;
    }
    .feedback-box.show {
      display: block;
      animation: fadeSlide 0.25s ease;
    }
    .feedback-box.correct {
      background: #ecfdf5;
      border-left-color: #059669;
    }
    .feedback-box.wrong {
      background: #fef2f2;
      border-left-color: #dc2626;
    }
    .feedback-box .fb-result {
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 4px;
    }
    .feedback-box .fb-result .icon { margin-right: 8px; }
    .feedback-box .fb-explain {
      color: #1f3a57;
      line-height: 1.5;
      margin-top: 4px;
      font-size: 0.93rem;
    }
    .feedback-box .fb-answer {
      font-weight: 600;
      color: #0b2b4a;
      margin-top: 6px;
      background: #e9edf4;
      padding: 4px 16px;
      border-radius: 30px;
      display: inline-block;
      font-size: 0.88rem;
    }
    /* Navigation */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
      border-top: 2px solid #e9edf4;
      padding-top: 18px;
    }
    .nav-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 9px 26px;
      border: none;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #e9edf4;
      color: #1f3a57;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: #1a4b7a;
      color: #fff;
    }
    .btn-primary:hover { background: #0f3b62; }
    .btn-success {
      background: #059669;
      color: #fff;
    }
    .btn-success:hover { background: #047857; }
    .btn-outline {
      background: transparent;
      border: 2px solid #cbd5e1;
    }
    .btn-outline:hover { border-color: #94a3b8; background: #f1f5f9; }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    /* Results */
    .results-panel {
      text-align: center;
      padding: 30px 10px 10px;
    }
    .results-panel .big-score {
      font-size: 4rem;
      font-weight: 800;
      color: #0b2b4a;
      line-height: 1;
    }
    .results-panel .big-score span { color: #2563eb; }
    .results-panel .sub-text {
      font-size: 1.05rem;
      color: #3d5670;
      margin: 8px 0 20px;
    }
    .results-panel .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      max-width: 400px;
      margin: 16px auto 26px;
    }
    .stats-grid .stat-card {
      background: #f8fafc;
      border-radius: 16px;
      padding: 12px 8px;
    }
    .stats-grid .stat-card .num {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0b2b4a;
    }
    .stats-grid .stat-card .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #6b7f9a;
      letter-spacing: 0.3px;
      font-weight: 600;
    }
    .results-panel .btn { font-size: 0.95rem; padding: 12px 40px; }
    /* Responsive */
    @media (max-width: 640px) {
      .app { padding: 16px 14px 24px; }
      .title { font-size: 1.05rem; }
      .title small { font-size: 0.65rem; }
      .score-badge { font-size: 0.75rem; padding: 4px 14px; }
      .q-text { font-size: 1rem; }
      .option-item { padding: 9px 12px; gap: 8px; }
      .option-item .opt-text { font-size: 0.85rem; }
      .btn { padding: 7px 16px; font-size: 0.75rem; }
      .nav-row { flex-direction: column; align-items: stretch; }
      .nav-group { justify-content: center; }
      .results-panel .big-score { font-size: 2.8rem; }
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e9edf4; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #b7c9e6; border-radius: 10px; }
  </style>
</head>
<body>
<div class="app" id="app">
  <header class="header">
    <div class="title">
      📘 Mock Exam
      <small>Fundamentals of Programming · Weeks 1–14</small>
    </div>
    <div class="score-badge">
      🏆 Score <span id="scoreDisplay">0</span>
    </div>
  </header>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="qProgress">Question 1 of 150</span>
      <span id="answeredCount">0 answered</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div id="questionContainer"></div>
  <div id="resultsContainer" style="display:none;"></div>
</div>

<script>
// ============================================================
//  DATA – Full 150 questions
// ============================================================
const QUESTIONS = [];

// ---------- PART A: MCQ (Q1–100) ----------
const mcqData = [
  // Q1–15: Introduction & Basics
  { q: 'What is a computer program?', opts: ['A physical component of a computer', 'A sequence of instructions to perform a task', 'A type of computer hardware', 'An operating system'], ans: 1, exp: 'A program is a set of instructions that tells the computer what to do.' },
  { q: 'Which programming paradigm focuses on "HOW" to achieve a result through step-by-step instructions?', opts: ['Declarative programming', 'Imperative programming', 'Logic programming', 'Markup language'], ans: 1, exp: 'Imperative programming describes step-by-step how to achieve a result.' },
  { q: 'Python is an example of which type of programming language?', opts: ['Low-level language', 'Machine language', 'High-level language', 'Assembly language'], ans: 2, exp: 'Python is a high-level language, abstracted from hardware details.' },
  { q: 'What does a compiler do?', opts: ['Executes code line by line', 'Translates high-level code to machine code all at once', 'Converts binary to decimal', 'Writes code automatically'], ans: 1, exp: 'A compiler translates the entire source code to machine code at once.' },
  { q: 'Which of the following is a characteristic of declarative programming?', opts: ['Focuses on step-by-step process', 'Focuses on WHAT the program should achieve', 'Uses objects and classes', 'Uses procedures and functions'], ans: 1, exp: 'Declarative programming focuses on the desired outcome (WHAT) rather than steps.' },
  { q: 'What is the difference between a compiler and an interpreter?', opts: ['Compiler is faster than interpreter', 'Compiler translates all code at once; interpreter translates line by line', 'Interpreter is used for high-level languages only', 'Both are the same'], ans: 1, exp: 'Compiler translates entire program at once; interpreter executes line by line.' },
  { q: 'Which of the following is NOT a pillar of computational thinking?', opts: ['Decomposition', 'Abstraction', 'Compilation', 'Pattern recognition'], ans: 2, exp: 'Compilation is not a pillar; the pillars are decomposition, abstraction, pattern recognition, and algorithms.' },
  { q: 'What is an algorithm?', opts: ['A type of programming language', 'A step-by-step solution to solve a problem', 'A computer hardware component', 'A debugging tool'], ans: 1, exp: 'An algorithm is a finite sequence of well-defined steps to solve a problem.' },
  { q: 'Which is NOT a key aspect of an algorithm?', opts: ['Input', 'Finite steps', 'Unlimited steps', 'Unambiguous steps'], ans: 2, exp: 'Algorithms must have finite, unambiguous steps, not unlimited.' },
  { q: 'What is the purpose of problem decomposition?', opts: ['To combine small problems into one', 'To break down a complex problem into smaller parts', 'To ignore all problem details', 'To create unnecessary complexity'], ans: 1, exp: 'Decomposition breaks a complex problem into smaller, manageable parts.' },
  { q: 'Which programming paradigm uses objects and classes?', opts: ['Procedural programming', 'Object-oriented programming', 'Logic programming', 'Functional programming'], ans: 1, exp: 'OOP uses objects and classes to model real-world entities.' },
  { q: 'What is abstraction in computational thinking?', opts: ['Adding more details to a problem', 'Ignoring irrelevant information to reduce complexity', 'Making problems more complex', 'Writing code without planning'], ans: 1, exp: 'Abstraction focuses on essential details while ignoring irrelevant ones.' },
  { q: 'Which language is NOT an example of a procedural programming language?', opts: ['C', 'Pascal', 'Prolog', 'Fortran'], ans: 2, exp: 'Prolog is a logic programming language, not procedural.' },
  { q: 'What does the term "machine code" refer to?', opts: ['Code written in Python', 'Binary instructions that a computer can execute directly', 'Code written by machines', 'High-level programming language'], ans: 1, exp: 'Machine code consists of binary instructions directly understood by the CPU.' },
  { q: 'What is the main advantage of using an IDE?', opts: ['It only provides a text editor', 'It offers features like syntax highlighting and debugging', 'It converts code to machine language', 'It is the only way to run Python'], ans: 1, exp: 'IDEs provide helpful tools like syntax highlighting, debugging, and code completion.' },
  // Q16–25: Program Design
  { q: 'What is the first step in software development?', opts: ['Writing code', 'Requirements gathering', 'Testing', 'Deployment'], ans: 1, exp: 'Requirements gathering is the first phase to understand what needs to be built.' },
  { q: 'Which type of requirement describes WHAT the system should do?', opts: ['Non-functional requirement', 'Functional requirement', 'Performance requirement', 'Security requirement'], ans: 1, exp: 'Functional requirements specify the behavior and functions of the system.' },
  { q: '"The system should handle 1000 users simultaneously" is an example of:', opts: ['Functional requirement', 'Non-functional requirement', 'User interface requirement', 'Data requirement'], ans: 1, exp: 'Performance requirements like handling load are non-functional.' },
  { q: 'What does SMART stand for?', opts: ['Simple, Manageable, Achievable, Reliable, Timely', 'Specific, Measurable, Achievable, Relevant, Time-bound', 'Structured, Modular, Adaptive, Robust, Testable', 'Secure, Maintainable, Accessible, Reliable, Timely'], ans: 1, exp: 'SMART stands for Specific, Measurable, Achievable, Relevant, Time-bound.' },
  { q: 'Which approach breaks down problems from the top?', opts: ['Bottom-up approach', 'Top-down approach', 'Side-ways approach', 'Random approach'], ans: 1, exp: 'Top-down approach starts with the big picture and breaks it down into smaller parts.' },
  { q: 'What is an advantage of the bottom-up approach?', opts: ['Faster implementation', 'Reusability of components', 'Easier integration', 'Simpler design'], ans: 1, exp: 'Bottom-up builds reusable components that can be combined later.' },

  { q: 'In a flowchart, what does a parallelogram represent?', opts: ['Start/End', 'Decision', 'Input/Output', 'Process'], ans: 2, exp: 'Parallelogram denotes input or output operations.' },
  { q: 'Which of the following is NOT a technique for requirements gathering?', opts: ['Interviews', 'Surveys', 'Compilation', 'Brainstorming'], ans: 2, exp: 'Compilation is a programming step, not a requirement gathering technique.' },

// ============================================================
//  APP STATE
// ============================================================
const state = {
  current: 0,
  total: QUESTIONS.length,
  answeredCount: 0,
  score: 0
};

// ============================================================
//  RENDER
// ============================================================
const container = document.getElementById('questionContainer');
const resultsContainer = document.getElementById('resultsContainer');
const scoreDisplay = document.getElementById('scoreDisplay');
const qProgress = document.getElementById('qProgress');
const answeredCountEl = document.getElementById('answeredCount');
const progressFill = document.getElementById('progressFill');

function render() {
  if (state.answeredCount === state.total) {
    showResults();
    return;
  }

  const q = QUESTIONS[state.current];
  const isAnswered = q.answered;
  const isCorrect = isAnswered && q.userAnswer === q.correct;

  let partLabel = q.part === 'A' ? 'Part A – MCQ' : 'Part B – Fill in the Blank';
  let badgeClass = q.part === 'A' ? 'section-badge' : 'section-badge part-b';

  let html = `
    <div class="question-card">
      <div class="${badgeClass}">${partLabel}</div>
      <div class="q-number">Question ${q.id} of ${state.total}</div>
      <div class="q-text">${q.question}</div>
  `;

  if (q.type === 'mcq') {
    html += `<div class="options-grid">`;
    const letters = ['A', 'B', 'C', 'D'];
    q.options.forEach((opt, idx) => {
      let cls = 'option-item';
      if (isAnswered) {
        if (idx === q.correct) cls += ' correct-reveal';
        else if (idx === q.userAnswer && idx !== q.correct) cls += ' wrong-reveal';
      } else if (q.userAnswer === idx) {
        cls += ' selected';
      }
      const checked = (q.userAnswer === idx) ? 'checked' : '';
      const disabled = isAnswered ? 'disabled' : '';
      html += `
        <label class="${cls}">
          <input type="radio" name="q${q.id}" value="${idx}" ${checked} ${disabled} />
          <span class="opt-label">${letters[idx]}.</span>
          <span class="opt-text">${opt}</span>
        </label>
      `;
    });
    html += `</div>`;
  }

  if (q.type === 'fill') {
    // Render code with blank inputs
    let codeHtml = q.code;
    // Replace {{blank}} with input field
    const parts = codeHtml.split(/(\{\{blank\}\})/);
    let finalHtml = '';
    parts.forEach((part, i) => {
      if (part === '{{blank}}') {
        const val = q.userAnswer || '';
        const disabled = isAnswered ? 'disabled' : '';
        finalHtml += `<input class="blank-input" type="text" value="${val}" ${disabled} />`;
      } else {
        finalHtml += part;
      }
    });
    html += `<div class="code-block">${finalHtml}</div>`;
  }

  // Feedback
  let feedbackHtml = '';
  if (isAnswered) {
    const fbClass = isCorrect ? 'correct' : 'wrong';
    const icon = isCorrect ? '✅' : '❌';
    const resultText = isCorrect ? 'Correct!' : 'Not quite.';
    let answerDisplay = q.correct;
    if (q.type === 'mcq') {
      const letters = ['A', 'B', 'C', 'D'];
      answerDisplay = `${letters[q.correct]}. ${q.options[q.correct]}`;
    }
    feedbackHtml = `
      <div class="feedback-box show ${fbClass}">
        <div class="fb-result"><span class="icon">${icon}</span> ${resultText}</div>
        <div class="fb-explain">${q.explanation}</div>
        <div class="fb-answer">✓ Correct answer: ${answerDisplay}</div>
      </div>
    `;
  }
  html += feedbackHtml;

  // Navigation
  const prevDisabled = state.current === 0 ? 'disabled' : '';
  const nextDisabled = state.current === state.total - 1 ? 'disabled' : '';
  const checkDisabled = isAnswered ? 'disabled' : '';

  html += `
    <div class="nav-row">
      <div class="nav-group">
        <button class="btn btn-outline" id="prevBtn" ${prevDisabled}>← Previous</button>
        <button class="btn btn-outline" id="nextBtn" ${nextDisabled}>Next →</button>
      </div>
      <div class="nav-group">
        <button class="btn btn-primary" id="checkBtn" ${checkDisabled}>✔ Check Answer</button>
      </div>
    </div>
  `;

  html += `</div>`;
  container.innerHTML = html;
  container.style.display = 'block';
  resultsContainer.style.display = 'none';

  // Update progress
  const pct = (state.current / (state.total - 1)) * 100;
  progressFill.style.width = `${Math.min(pct, 100)}%`;
  qProgress.textContent = `Question ${state.current + 1} of ${state.total}`;
  answeredCountEl.textContent = `${state.answeredCount} answered`;
  scoreDisplay.textContent = state.score;

  // Event listeners
  // Radio buttons
  document.querySelectorAll('input[type="radio"]').forEach(el => {
    el.addEventListener('change', function() {
      if (QUESTIONS[state.current].answered) return;
      const val = parseInt(this.value);
      QUESTIONS[state.current].userAnswer = val;
      render();
    });
  });

  // Fill-in blank inputs
  const blankInputs = document.querySelectorAll('.blank-input');
  blankInputs.forEach(input => {
    input.addEventListener('input', function() {
      if (QUESTIONS[state.current].answered) return;
      QUESTIONS[state.current].userAnswer = this.value.trim();
    });
  });

  // Buttons
  document.getElementById('prevBtn').addEventListener('click', () => {
    if (state.current > 0) { state.current--; render(); }
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (state.current < state.total - 1) { state.current++; render(); }
  });
  document.getElementById('checkBtn').addEventListener('click', checkAnswer);
}

// ============================================================
//  CHECK ANSWER
// ============================================================
function checkAnswer() {
  const q = QUESTIONS[state.current];
  if (q.answered) return;

  let userAns = q.userAnswer;

  // For fill, get from input (already in userAnswer via input event)
  if (q.type === 'fill') {
    const inputs = document.querySelectorAll('.blank-input');
    if (inputs.length === 1) {
      userAns = inputs[0].value.trim();
      q.userAnswer = userAns;
    }
  }

  if (userAns === null || userAns === undefined || userAns === '') {
    alert('Please provide an answer.');
    return;
  }

  // Compare
  let isCorrect = false;
  if (q.type === 'mcq') {
    isCorrect = (userAns === q.correct);
  } else {
    // Fill: case-insensitive trim
    isCorrect = (String(userAns).toLowerCase().trim() === String(q.correct).toLowerCase().trim());
  }

  q.answered = true;
  state.answeredCount++;
  if (isCorrect) state.score++;

  render();
}

// ============================================================
//  RESULTS
// ============================================================
function showResults() {
  container.style.display = 'none';
  resultsContainer.style.display = 'block';

  const total = state.total;
  const correct = state.score;
  const wrong = total - correct;
  const pct = Math.round((correct / total) * 100);

  let grade = 'Keep Practicing 💪';
  let emoji = '📘';
  if (pct >= 90) { grade = 'Excellent! 🎉'; emoji = '🏆'; }
  else if (pct >= 75) { grade = 'Good Job! 👍'; emoji = '⭐'; }
  else if (pct >= 60) { grade = 'Not Bad! 📈'; emoji = '📊'; }
  else if (pct >= 40) { grade = 'Keep Studying! 📖'; emoji = '📚'; }
  else { grade = 'Review the Material 🔄'; emoji = '🔄'; }

  resultsContainer.innerHTML = `
    <div class="results-panel">
      <div class="big-score">${emoji} <span>${correct}</span> / ${total}</div>
      <div class="sub-text">${pct}% · ${grade}</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="num">${correct}</div><div class="label">Correct</div></div>
        <div class="stat-card"><div class="num">${wrong}</div><div class="label">Incorrect</div></div>
        <div class="stat-card"><div class="num">${total}</div><div class="label">Total</div></div>
      </div>
      <button class="btn btn-success" id="restartBtn">🔄 Start Over</button>
    </div>
  `;

  document.getElementById('restartBtn').addEventListener('click', () => {
    QUESTIONS.forEach(q => { q.answered = false; q.userAnswer = null; });
    state.current = 0; state.answeredCount = 0; state.score = 0;
    render();
  });

  progressFill.style.width = '100%';
  qProgress.textContent = 'Completed!';
  answeredCountEl.textContent = `${state.answeredCount} answered`;
  scoreDisplay.textContent = state.score;
}

// ============================================================
//  KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    const btn = document.getElementById('nextBtn');
    if (btn && !btn.disabled) btn.click();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    const btn = document.getElementById('prevBtn');
    if (btn && !btn.disabled) btn.click();
  } else if (e.key === 'Enter') {
    const btn = document.getElementById('checkBtn');
    if (btn && !btn.disabled) btn.click();
  }
});

// ============================================================
//  INIT
// ============================================================
render();
</script>
</body>
</html>
